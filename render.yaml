# Render Blueprint: deploys the whole project as ONE free web service that
# serves both the game website and the WebSocket game server on one URL.
# See DEPLOYMENT.md for the click-by-click guide.
services:
  - type: web
    name: game-night
    runtime: node
    plan: free
    # --include=dev is required: NODE_ENV=production (below) makes a bare
    # "npm install" skip devDependencies, but the build needs typescript
    # and vite. Verified failure mode: deploy dies in typecheck without it.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
